
<!DOCTYPE html>
<html lang="en">
<head>

<title>Book Taxi - Choudhary Tour & Travels</title>

<meta name="description" content="Book taxi in Delhi instantly. Local and outstation cab service available 24x7.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#1c120c;
color:white;
}

/* TOPBAR */
.topbar{
background:linear-gradient(90deg,#3b2418,#2a1a12);
padding:10px;
text-align:center;
font-weight:600;
color:#f5c16c;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#2a1a12;
position:sticky;
top:0;
z-index:1000;
}

.logo-box{
display:flex;
align-items:center;
gap:12px;
}

.logo-box img{
width:70px;
height:70px;
border-radius:50%;
border:3px solid #f5c16c;
object-fit:cover;
}

.logo-box h2{
color:#f5c16c;
font-size:20px;
}

.navbar a{
color:white;
text-decoration:none;
margin:0 12px;
font-weight:500;
}

.navbar a:hover{
color:#f5c16c;
}

/* HERO */
.hero-taxi{
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1503376780353-7e6692767b70');
background-size:cover;
background-position:center;
padding:100px 20px;
text-align:center;
}

.hero-taxi h1{
font-size:40px;
margin-bottom:10px;
}

.hero-taxi p{
color:#f5c16c;
}

/* BOOKING BOX */
.booking-box{
background:#e6d3c5;
color:black;
padding:30px;
max-width:600px;
margin:40px auto;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
border-left:6px solid #f5c16c;
}

.booking-box h2{
text-align:center;
margin-bottom:15px;
}

.booking-box input,
.booking-box select,
.booking-box textarea{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #bfa89a;
border-radius:5px;
}

.booking-box button{
width:100%;
padding:14px;
background:#25D366;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

.booking-box button:hover{
background:#1ebe5d;
}

/* MAP AREA */
#map{
height:400px;
max-width:900px;
margin:40px auto;
border-radius:10px;
border:6px solid white;
background:white;
}

/* VEHICLES */
.section{
padding:60px 8%;
text-align:center;
}

.section h2{
color:#f5c16c;
margin-bottom:40px;
}

.vehicle-grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.vehicle-card{
background:#2a1a12;
padding:20px;
border-radius:12px;
width:260px;
transition:0.3s;
}

.vehicle-card:hover{
transform:translateY(-5px);
}

.vehicle-card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.vehicle-card p{
color:#f5c16c;
}

/* FOOTER */
.footer{
background:#120b08;
padding:25px;
text-align:center;
color:#aaa;
}

</style>

</head>

<body>

<div class="topbar">
📞 +91 6376219433 | CHOUDHARY TOUR & TRAVELS
</div>

<div class="navbar">

<div class="logo-box">
<img src="images/logo.jpeg">
<h2>Choudhary Travels</h2>
</div>

<div>
<a href="index.html">Home</a>
<a href="gettaxi.html">Get Taxi</a>
<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="contacts.html">Contact</a>
</div>

</div>

<div class="hero-taxi">
<h1>Book Your Taxi Now</h1>
<p>Safe • Reliable • Affordable Cab Service</p>
</div>

<div class="booking-box">

<h2>Quick Booking</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="number" placeholder="Contact Number">
<input type="text" id="pickup" placeholder="Pickup Location">
<input type="text" id="drop" placeholder="Drop Location">

<select id="vehicle">
<option>Select Vehicle</option>
<option>Sedan - ₹11/km</option>
<option>SUV - ₹14/km</option>
<option>Traveller - ₹25-35/km</option>
</select>

<textarea id="message" placeholder="Additional Message"></textarea>

<button onclick="sendBooking()">Book via WhatsApp</button>

</div>

<div id="map"></div>

<div class="section">

<h2>Our Vehicles</h2>

<div class="vehicle-grid">

<div class="vehicle-card">
<img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d">
<h3>Sedan</h3>
<p>₹11 per KM</p>
</div>

<div class="vehicle-card">
<img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2">
<h3>SUV</h3>
<p>₹14 per KM</p>
</div>

<div class="vehicle-card">
<img src="https://images.unsplash.com/photo-1583267746897-2cf415887172">
<h3>Traveller</h3>
<p>₹25 – ₹35 per KM</p>
</div>

</div>

</div>

<div class="footer">
© 2026 CHOUDHARY TOUR & TRAVELS
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([28.6139, 77.2090], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OpenStreetMap'
}).addTo(map);

function sendBooking(){

let name=document.getElementById("name").value;
let number=document.getElementById("number").value;
let pickup=document.getElementById("pickup").value;
let drop=document.getElementById("drop").value;
let vehicle=document.getElementById("vehicle").value;
let message=document.getElementById("message").value;

let text=`New Taxi Booking:
Name: ${name}
Contact: ${number}
Pickup: ${pickup}
Drop: ${drop}
Vehicle: ${vehicle}
Message: ${message}`;

let url="https://wa.me/916376219433?text="+encodeURIComponent(text);
window.open(url,"_blank");

}

</script>

</body>
</html>
