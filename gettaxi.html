<script>

// Map Start
var map = L.map('map').setView([26.9124, 75.7873], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OpenStreetMap'
}).addTo(map);

var pickupMarker;
var dropMarker;

// Live Pickup Location
navigator.geolocation.getCurrentPosition(function(position) {

var lat = position.coords.latitude;
var lon = position.coords.longitude;

pickupMarker = L.marker([lat, lon]).addTo(map)
.bindPopup("Pickup Location")
.openPopup();

map.setView([lat, lon], 15);

});

// Address search function
async function searchLocation(address, type){

let url = `https://nominatim.openstreetmap.org/search?format=json&q=${address}`;

let response = await fetch(url);
let data = await response.json();

if(data.length === 0){
alert("Location not found");
return;
}

let lat = data[0].lat;
let lon = data[0].lon;

map.setView([lat, lon], 14);

if(type === "pickup"){

if(pickupMarker){
map.removeLayer(pickupMarker);
}

pickupMarker = L.marker([lat, lon]).addTo(map)
.bindPopup("Pickup Location")
.openPopup();

document.getElementById("pickup_lat").value = lat;
document.getElementById("pickup_lng").value = lon;

}

if(type === "drop"){

if(dropMarker){
map.removeLayer(dropMarker);
}

dropMarker = L.marker([lat, lon]).addTo(map)
.bindPopup("Drop Location")
.openPopup();

document.getElementById("drop_lat").value = lat;
document.getElementById("drop_lng").value = lon;

}

}

// Pickup typing
document.getElementById("pickup").addEventListener("change", function(){
searchLocation(this.value, "pickup");
});

// Drop typing
document.getElementById("drop").addEventListener("change", function(){
searchLocation(this.value, "drop");
});

// WhatsApp Booking
function sendBooking(){

let name=document.getElementById("name").value;
let number=document.getElementById("number").value;
let pickup=document.getElementById("pickup").value;
let drop=document.getElementById("drop").value;
let vehicle=document.getElementById("vehicle").value;
let message=document.getElementById("message").value;

if(!name || !number || !pickup || !drop || !vehicle){
alert("Please fill all required fields");
return;
}

let text=`New Taxi Booking:
Name: ${name}
Contact: ${number}
Pickup: ${pickup}
Drop: ${drop}
Vehicle: ${vehicle}
Message: ${message}`;

let url="https://wa.me/916376219433?text="+encodeURIComponent(text);
window.open(url,"_blank");
}

</script>
